name: Create PyInstaller .exe

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: install dependencies
      shell: bash
      run: |
        uv sync --locked --python "$(which python)" --group dev
        uv run python saenopy/add_source.py

    - name: build exe with pyinstaller
      shell: bash
      run: |
          uv run pyinstaller --hidden-import=scipy.io --copy-metadata imageio --clean -y --dist output/saenopy_run --onefile --icon "saenopy/img/Icon.ico" --splash "saenopy/img/logo_splash.png" --add-data "saenopy/img:saenopy/img"  saenopy/gui/gui_master.py
          mv output/saenopy_run/gui_master output/saenopy_run/saenopy
          chmod +x output/saenopy_run/saenopy

    - uses: actions/upload-artifact@v6
      with:
        name: saenopy_linux
        path: output/saenopy_run

    - name: Upload GitHub release assets
      run: gh release upload $TAG output/saenopy_run/saenopy --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: v1.0.8

  build-windows:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: install dependencies
        shell: bash
        run: |
          uv sync --locked --python 3.12 --group dev
          uv run python saenopy/add_source.py

      - name: build exe with pyinstaller
        shell: bash
        run: |
          uv run pyinstaller --hidden-import=scipy.io --copy-metadata imageio --clean -y --dist output/saenopy_run --onefile --icon "saenopy/img/Icon.ico" --splash "saenopy/img/logo_splash.png" --add-data "saenopy/img;saenopy/img"  saenopy/gui/gui_master.py
          mv output/saenopy_run/gui_master.exe output/saenopy_run/saenopy.exe

      - uses: actions/upload-artifact@v6
        with:
          name: saenopy_windows
          path: output/saenopy_run

      - name: Upload GitHub release assets
        run: gh release upload v1.0.8 "output\saenopy_run\saenopy.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.0.8

  build-mac:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      shell: bash
      run: |
        uv sync --locked --python 3.12 --group dev
        uv run python saenopy/add_source.py

    - name: Import Apple signing certificate
      shell: bash
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
      run: |
        echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
        security create-keychain -p "$KEYCHAIN_PWD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
        security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" build.keychain

    - name: Build executable with PyInstaller
      shell: bash
      run: |
        uv run pyinstaller --copy-metadata imageio --clean -y --dist output/saenopy_run --windowed --icon "saenopy/img/Icon.icns" --add-data "saenopy/img:saenopy/img" saenopy/gui/gui_master.py
        mv output/saenopy_run/gui_master.app output/saenopy_run/saenopy_mac.app

    - name: Sign macOS app
      shell: bash
      env:
        DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      run: |
        codesign --force --deep --options runtime --timestamp \
          --entitlements .github/macos/entitlements.plist \
          --sign "$DEVELOPER_ID_APPLICATION" \
          output/saenopy_run/saenopy_mac.app
        codesign --verify --deep --strict --verbose=2 output/saenopy_run/saenopy_mac.app

    - name: Notarize macOS app
      shell: bash
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        ditto -c -k --keepParent output/saenopy_run/saenopy_mac.app output/saenopy_run/saenopy_mac.notary.zip
        xcrun notarytool submit output/saenopy_run/saenopy_mac.notary.zip \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait
        xcrun stapler staple output/saenopy_run/saenopy_mac.app
        xcrun stapler validate output/saenopy_run/saenopy_mac.app
        rm output/saenopy_run/saenopy_mac.notary.zip
        ditto -c -k --keepParent output/saenopy_run/saenopy_mac.app output/saenopy_run/saenopy_mac.app.zip

    - uses: actions/upload-artifact@v6
      with:
        name: saenopy_mac
        path: output/saenopy_run

    - name: Upload GitHub release assets
      run: gh release upload $TAG output/saenopy_run/saenopy_mac.app.zip --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: v1.0.8
