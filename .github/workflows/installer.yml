name: Create PyInstaller .exe

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: install dependencies
      shell: bash
      run: |
        uv sync --locked --python 3.12 --group dev
        uv run python saenopy/add_source.py

    - name: build exe with pyinstaller
      shell: bash
      run: |
          uv run pyinstaller --hidden-import=scipy.io --clean -y --dist output/saenopy_run --onefile --icon "saenopy/img/Icon.ico" --splash "saenopy/img/logo_splash.png" --add-data "saenopy/img:saenopy/img"  saenopy/gui/gui_master.py 
          mv output/saenopy_run/gui_master output/saenopy_run/saenopy
          chmod +x output/saenopy_run/saenopy

    - uses: actions/upload-artifact@v4
      with:
        name: saenopy_linux
        path: output/saenopy_run

    - name: Upload GitHub release assets
      run: gh release upload $TAG output/saenopy_run/saenopy --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: v1.0.7

  build-windows:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: install dependencies
        shell: bash
        run: |
          uv sync --locked --python 3.12 --group dev
          uv run python saenopy/add_source.py

      - name: build exe with pyinstaller
        shell: bash
        run: |
          uv run pyinstaller --hidden-import=scipy.io --clean -y --dist output/saenopy_run --onefile --icon "saenopy/img/Icon.ico" --splash "saenopy/img/logo_splash.png" --add-data "saenopy/img;saenopy/img"  saenopy/gui/gui_master.py
          mv output/saenopy_run/gui_master.exe output/saenopy_run/saenopy.exe

      - uses: actions/upload-artifact@v4
        with:
          name: saenopy_windows
          path: output/saenopy_run

      - name: Upload GitHub release assets
        run: gh release upload v1.0.7 "output\saenopy_run\saenopy.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v1.0.7

  build-mac:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      shell: bash
      run: |
        uv sync --locked --python 3.12 --group dev
        uv run python saenopy/add_source.py

    - name: Build executable with PyInstaller
      shell: bash
      run: |
        uv run pyinstaller --clean -y --dist output/saenopy_run --windowed --add-data "saenopy/img:saenopy/img" saenopy/gui/gui_master.py
        mv output/saenopy_run/gui_master.app output/saenopy_run/saenopy_mac.app     
        cd output/saenopy_run
        zip -r saenopy_mac.app.zip saenopy_mac.app
        cd ../../
        
    - uses: actions/upload-artifact@v4
      with:
        name: saenopy_mac
        path: output/saenopy_run

    - name: Upload GitHub release assets
      run: gh release upload $TAG output/saenopy_run/saenopy_mac.app.zip --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: v1.0.7
